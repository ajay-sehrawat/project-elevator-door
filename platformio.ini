[env:esp32dev]
platform     = espressif32
board        = ttgo-lora32-v1
framework    = espidf
monitor_speed = 115200
upload_port  = COM5
monitor_port = COM5

; Enable C99 for designated struct initialisers and fixed-width types
build_flags =
    -std=gnu99
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ESP_TASK_WDT=y
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=5